name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Modules/apigee/proxies

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Deploy Apigee Proxy
        run: |
          mvn clean install -Peval \
            -Dorg=internship-439613 \
            -Denv=eval \
            -Dbearer="ya29.a0AT3oNZ8LgaGERqg7uo6iPvyCUxKS0VMQiJI-FFzp-wWpJyVf8VN0rU3VJJfTTyC-oDW6cCCJCkn9khxPPCaUEtBrUn5isPUaj5Ho6g8jwA2ZSPzQmUs_KK-aPuwbz9IOAkm4Pw4WIyd4OoLI9aWaaemyn6Y3_CnH19xHt1h6M6ccnFUl9MeTiMWzfCg2JSyoWONqnklXyIG7aCgYKAfYSARISFQHGX2Miptij0rxhbchBDzkaYDxZow0211" \
            -Dapigee.options=override
