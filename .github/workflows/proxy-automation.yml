name: Deploy Apigee Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Modules/apigee/proxies

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Deploy Apigee Proxy
        env:
          APIGEE_TOKEN: ${{ secrets.APIGEE_TOKEN }}
          APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
        run: |
          mvn clean install -Peval \
            -Dorg=${APIGEE_ORG} \
            -Denv=eval \
            -Dbearer=${APIGEE_TOKEN} \
            -Dapigee.options=override
